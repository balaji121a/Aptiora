<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APTIORA</title>
<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
    background-size: 400% 400%;
    animation: gradientMove 8s ease infinite;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  #particles {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:1;
    pointer-events:none;
  }

  .overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.2);
    opacity:0;
    pointer-events:none;
    transition: opacity 2s ease;
    z-index:5;
  }

  .container {
    position: relative;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 50px 40px;
    border-radius: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    animation: fadeUp 1s ease forwards;
    opacity:1;
    transition: opacity 2s ease;
    z-index:10;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(30px); }
    to { opacity:1; transform: translateY(0); }
  }

  .app-name {
    font-size: clamp(30px,6vw,50px);
    font-weight:700;
    margin:0 0 10px;
    text-shadow:0 2px 10px rgba(0,0,0,0.3);
  }

  #welcome {
    font-size: clamp(16px,3vw,22px);
    font-weight:300;
    margin-bottom:30px;
    color: rgba(255,255,255,0.9);
    text-shadow:0 1px 5px rgba(0,0,0,0.2);
  }

  button {
    position: relative;
    overflow: hidden;
    width:160px;
    padding:12px 0;
    margin:10px 0;
    font-size:16px;
    color:white;
    background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
    background-size: 400% 400%;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    animation: buttonGradient 5s ease infinite, buttonGlow 2s ease-in-out infinite alternate;
  }

  button:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 0 20px rgba(102,126,234,0.6), 0 5px 15px rgba(0,0,0,0.3);
  }

  @keyframes buttonGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes buttonGlow {
    0% { box-shadow: 0 0 10px rgba(102,126,234,0.4); }
    50% { box-shadow: 0 0 20px rgba(102,126,234,0.6); }
    100% { box-shadow: 0 0 10px rgba(102,126,234,0.4); }
  }

  button span.ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: rippleAnim 0.6s linear;
    background: rgba(255,255,255,0.6);
    pointer-events: none;
  }

  @keyframes rippleAnim {
    to { transform: scale(4); opacity:0; }
  }

  @media (max-width:500px){
    .container { padding:40px 20px; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="overlay" id="overlay"></div>

<div class="container" id="container">
  <h1 class="app-name">APTIORA</h1>
  <p id="welcome">Welcome, Online Exam System</p>
  <button id="startBtn">Start Now</button>
</div>

<script>
  // Ripple + fade-out
  let redirecting = false;
  const btn = document.getElementById("startBtn");
  const container = document.getElementById("container");
  const overlay = document.getElementById("overlay");

  btn.addEventListener("click",(e)=>{
    if(redirecting) return;
    redirecting = true;

    const circle = document.createElement("span");
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    circle.style.width = circle.style.height = size + "px";
    circle.style.left = e.clientX - rect.left - size/2 + "px";
    circle.style.top = e.clientY - rect.top - size/2 + "px";
    circle.classList.add("ripple");
    btn.appendChild(circle);
    setTimeout(()=>circle.remove(),600);

    container.style.opacity = 0;
    overlay.style.opacity = 1;

    setTimeout(()=>{ window.location.href="login.html"; },2000);
  });

  // Auto welcome
  const username = localStorage.getItem("username");
  if(username){ document.getElementById("welcome").innerText="Welcome, Online Exam System"; }

  // ==============================
  // Interactive particles with cursor trails
  // ==============================
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;

  const particles = [];
  const particleCount = 60;
  const maxDistance = 120;

  const mouse = {x:null, y:null};

  canvas.addEventListener('mousemove', (e)=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
  canvas.addEventListener('mouseleave', ()=>{ mouse.x=null; mouse.y=null; });

  function random(min,max){ return Math.random()*(max-min)+min; }

  class Particle {
    constructor(){
      this.x = random(0,w);
      this.y = random(0,h);
      this.radius = random(2,5);
      this.speedX = random(-0.5,0.5);
      this.speedY = random(-0.5,0.5);
      this.alpha = random(0.3,0.8);
    }
    draw(){
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
      ctx.fill();
    }
    update(){
      this.x += this.speedX;
      this.y += this.speedY;

      // Mouse interaction
      if(mouse.x && mouse.y){
        let dx = this.x - mouse.x;
        let dy = this.y - mouse.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if(dist<80){ 
          this.x += dx*0.05;
          this.y += dy*0.05;
        }
      }

      if(this.x<0) this.x=w;
      if(this.x>w) this.x=0;
      if(this.y<0) this.y=h;
      if(this.y>h) this.y=0;
      this.draw();
    }
  }

  for(let i=0;i<particleCount;i++){ particles.push(new Particle()); }

  function drawLines(){
    for(let i=0;i<particleCount;i++){
      for(let j=i+1;j<particleCount;j++){
        let dx = particles[i].x - particles[j].x;
        let dy = particles[i].y - particles[j].y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if(dist<maxDistance){
          ctx.beginPath();
          ctx.strokeStyle = `rgba(255,255,255,${0.2*(1-dist/maxDistance)})`;
          ctx.lineWidth = 1;
          ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  function animate(){
    ctx.clearRect(0,0,w,h);
    particles.forEach(p=>p.update());
    drawLines();

    // Add cursor trail particle
    if(mouse.x && mouse.y){
      const trail = new Particle();
      trail.x = mouse.x + random(-5,5);
      trail.y = mouse.y + random(-5,5);
      trail.radius = random(1,3);
      trail.alpha = 0.7;
      particles.push(trail);
      if(particles.length>150) particles.splice(0,1); // limit total particles
    }

    requestAnimationFrame(animate);
  }
  animate();

  window.addEventListener('resize',()=>{
    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;
  });
</script>
</body>
</html>
