<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;

  background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
  background-size: 400% 400%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:1;
}

.container{
  position:relative;
  z-index:10;
  width:90%;
  max-width:800px;
  padding:30px;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  border-radius:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);

  animation:fadeUp 1s ease;
}

.title{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  margin-bottom:20px;
  color:white;
}

table{
  width:100%;
  border-collapse:collapse;
  color:white;
}

th{
  padding:10px;
  opacity:0.8;
}

td{
  padding:12px;
  text-align:center;
  border-top:1px solid rgba(255,255,255,0.2);
}

tr:hover{
  background:rgba(255,255,255,0.1);
  transform:scale(1.02);
  transition:0.3s;
}

.rank-1{
  background:linear-gradient(90deg,#facc15,#fbbf24);
  color:black;
}
.rank-2{
  background:linear-gradient(90deg,#e5e7eb,#d1d5db);
  color:black;
}
.rank-3{
  background:linear-gradient(90deg,#f59e0b,#fbbf24);
  color:black;
}

.btn{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:white;
  color:#3b82f6;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,255,255,0.6);
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

  <div class="title">🏆 Leaderboard</div>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Score</th>
      </tr>
    </thead>

    <tbody id="lbBody"></tbody>
  </table>

  <button class="btn" onclick="goBack()">⬅ Back</button>
  <button class="btn" onclick="downloadCertificate()">📜 Certificate</button>

  <!-- 🔥 NEW BUTTON -->
  <button class="btn" onclick="clearLeaderboard()">🧹 Clear Leaderboard</button>

</div>

<script>

// ================= DATA =================
let board = JSON.parse(localStorage.getItem("leaderboard")) || [];
board.sort((a,b)=>b.score-a.score);

let reg = localStorage.getItem("username");

let users = {
  "714524205005": "Balaji",
  "714524205053": "Vicky",
  "714524205027": "Ismail",
  "714524205041": "Sakthivel"
};

let currentUser = users[reg] || "User";

// ================= RENDER =================
let body = document.getElementById("lbBody");

board.forEach((u,i)=>{

  let cls="";
  let medal="";

  if(i==0){cls="rank-1"; medal="🥇";}
  else if(i==1){cls="rank-2"; medal="🥈";}
  else if(i==2){cls="rank-3"; medal="🥉";}

  let row = document.createElement("tr");
  row.className=cls;

  row.innerHTML=`
    <td>${medal} ${i+1}</td>
    <td>
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
        <div style="
          width:35px;
          height:35px;
          border-radius:50%;
          background:white;
          color:#3b82f6;
          display:flex;
          align-items:center;
          justify-content:center;
          font-weight:bold;
        ">
          ${u.name.charAt(0)}
        </div>
        ${u.name}
      </div>
    </td>
    <td>${u.score}</td>
  `;

  row.style.opacity=0;
  row.style.transform="translateY(20px)";

  setTimeout(()=>{
    row.style.transition="0.5s";
    row.style.opacity=1;
    row.style.transform="translateY(0)";
  }, i*200);

  body.appendChild(row);
});

// 🎉 CONFETTI
if(board.length>0){
  launchConfetti();
}

// BACK
function goBack(){
  window.location.href="dashboard.html";
}

// 📜 CERTIFICATE
function downloadCertificate(){

  let score = 0;
  let rank = null;

  board.forEach((u,i)=>{
    if(u.name === currentUser){
      score = u.score;
      rank = i + 1;
    }
  });

  if(score !== 20){
    alert("⚠️ You must answer all 20 questions!");
    return;
  }

  localStorage.setItem("rank", rank);
  window.location.href = "certificate.html";
}

// ================= CLEAR FUNCTION =================
function clearLeaderboard(){

  let confirmClear = confirm("Are you sure to clear leaderboard?");

  if(confirmClear){
    localStorage.removeItem("leaderboard");
    alert("✅ Leaderboard Cleared!");
    location.reload();
  }
}

// ================= CONFETTI =================
function launchConfetti(){
  for(let i=0;i<100;i++){
    let conf=document.createElement("div");
    conf.style.position="fixed";
    conf.style.left=Math.random()*window.innerWidth+"px";
    conf.style.top="-10px";
    conf.style.width="8px";
    conf.style.height="8px";
    conf.style.background=`hsl(${Math.random()*360},100%,50%)`;
    conf.style.zIndex="999";

    document.body.appendChild(conf);

    conf.animate([
      {transform:"translateY(0)"},
      {transform:`translateY(${window.innerHeight}px)`}
    ],{duration:3000});

    setTimeout(()=>conf.remove(),4000);
  }
}

// ================= PARTICLES =================
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

let w=canvas.width=window.innerWidth;
let h=canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*w,
    y:Math.random()*h,
    r:Math.random()*3,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,w,h);

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>w) p.dx*=-1;
    if(p.y<0||p.y>h) p.dy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize",()=>{
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;
});

</script>

</body>
</html>
