<!DOCTYPE html>
<html>
<head>
<title>Dashboard - APTIORA</title>

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(-45deg,#eef2ff,#f5f7fb,#e0e7ff,#f5f7fb);
  background-size:400% 400%;
  animation:bgMove 10s ease infinite;
  transition:0.4s;
}

body.dark{
  background:#121212;
  color:white;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* NAVBAR */
.navbar{
  background:#2b6cb0;
  color:white;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
}

.nav-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  font-weight:800;
  letter-spacing:2px;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:10px;
  position:relative;
}

/* DARK TOGGLE */
.toggle{
  cursor:pointer;
  font-size:18px;
}

/* PROFILE */
.profile-icon{
  width:35px;
  height:35px;
  border-radius:50%;
  background:white;
  color:#2b6cb0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  top:55px;
  right:0;
  background:white;
  color:black;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  display:none;
  z-index:9999;
  animation:fadeDown 0.3s ease;
}

.dropdown div{
  padding:10px 20px;
  cursor:pointer;
}
.dropdown div:hover{ background:#eee; }

@keyframes fadeDown{
  from{opacity:0; transform:translateY(-10px);}
  to{opacity:1; transform:translateY(0);}
}

/* HEADER */
.header{
  background: linear-gradient(135deg,#3b82f6,#6366f1);
  color:white;
  padding:25px;
  border-radius:20px;
  margin:20px;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1s ease forwards;
}

@keyframes fadeUp{
  to{opacity:1; transform:translateY(0);}
}

.name-glow{
  display:inline-block;
  padding:8px 18px;
  border-radius:25px;
  background:rgba(255,255,255,0.2);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  opacity:0;
  transform:translateY(40px);
  animation:fadeCard 1s ease forwards;
}

.card:nth-child(1){ animation-delay:0.5s; }
.card:nth-child(2){ animation-delay:1s; }

@keyframes fadeCard{
  to{opacity:1; transform:translateY(0);}
}

.card:hover{
  transform:translateY(-5px) scale(1.02);
  transition:0.3s;
}

.title{
  display:inline-block;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(255,255,255,0.25);
  margin-bottom:10px;
}

.aptitude-box,
.assessment-box{
  background: linear-gradient(135deg,#3b82f6,#6366f1);
  color:white;
}

.glass-box{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background: rgba(255,255,255,0.15);
}

/* BUTTON */
.btn, .start-btn{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:white;
  color:#3b82f6;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover, .start-btn:hover{
  transform:scale(1.05);
}

/* INFO */
.info-row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.badge{
  background:rgba(255,255,255,0.2);
  padding:8px 12px;
  border-radius:20px;
}

/* DARK MODE FIXES */
body.dark .navbar{ background:#1e1e1e; }
body.dark .card{ background:#1e1e1e; color:white; }
body.dark .dropdown{ background:#2a2a2a; color:white; }

</style>
</head>

<body>

<div class="navbar">
  <div>🏠 Dashboard</div>

  <div class="nav-center">APTIORA</div>

  <div class="nav-right">
    <span id="navName"></span>

    <span class="toggle" onclick="toggleDark()">🌙</span>

    <div class="profile-icon" id="icon" onclick="toggleDropdown()"></div>

    <div class="dropdown" id="dropdown">
      <div onclick="openProfile()">👤 Profile</div>
      <div onclick="logout()">🚪 Logout</div>
    </div>
  </div>
</div>

<div class="header">
  <h2 class="name-glow" id="name"></h2>

  <div class="info-row">
    <div class="badge">🎓 <span id="reg"></span></div>
    <div class="badge">💻 B.Tech IT</div>
    <div class="badge">📅 2024-2028</div>
  </div>
</div>

<div class="grid">

  <div class="card aptitude-box">
    <h3 class="title">📘 Aptitude Course</h3>
    <div class="glass-box">
      <div>📊 Aptitude</div>
      <div>📅 Start: 25-03-2026</div>
      <div>📅 End: 05-04-2026</div>
    </div>
    <button class="start-btn" onclick="goAptitude()">Start</button>
  </div>

  <div class="card assessment-box">
    <h3 class="title">📝 Assessment</h3>
    <div class="glass-box">
      <div>🧠 Aptitude Test</div>
    </div>
    <button class="btn" onclick="goAssessment()">Start Test</button>
    <button class="btn" onclick="openLeaderboard()">🏆 Leaderboard</button>
  </div>

</div>

<script>

// ✅ GET DATA
let reg = localStorage.getItem("username");
let name = localStorage.getItem("name");

let users = {
  "714524205005": "Balaji",
  "714524205053": "Vicky",
  "714524205027": "Ismail",
  "714524205041": "Sakthivel"
};

if(!name){
  name = users[reg] || "Unknown";
}

// ✅ DISPLAY
document.getElementById("name").innerText = name;
document.getElementById("navName").innerText = name;
document.getElementById("reg").innerText = reg;
document.getElementById("icon").innerText = name.charAt(0);

// DROPDOWN
function toggleDropdown(){
  let d=document.getElementById("dropdown");
  d.style.display=d.style.display==="block"?"none":"block";
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// NAVIGATION
function goAptitude(){
  localStorage.setItem("mode","aptitude");
  window.location.href="aptitude.html";
}

function goAssessment(){
  localStorage.setItem("mode","assessment");
  window.location.href="code.html";
}

function openLeaderboard(){
  window.location.href="leaderboard.html";
}

function openProfile(){
  window.location.href="profile.html";
}

// LOGOUT
function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

// CLOSE DROPDOWN
window.onclick=function(e){
  if(!e.target.closest(".nav-right")){
    document.getElementById("dropdown").style.display="none";
  }
}

</script>

</body>
</html>
